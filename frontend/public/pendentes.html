<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pendentes | FELIPINHO LAUNCHER</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
<style>
  .pend-card {
    background: var(--cinza-100, #1a1f2e);
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.07);
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: border-color .15s;
  }
  .pend-card:hover { border-color: rgba(255,176,32,0.35); }
  .pend-card__header { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .pend-card__tipo {
    width:36px; height:36px; border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:.95rem;
  }
  .pend-card__tipo.abast { background:rgba(52,152,219,.15); color:#3498DB; }
  .pend-card__tipo.manut { background:rgba(255,176,32,.15);  color:#FFB020; }
  .pend-card__info { flex:1; min-width:0; }
  .pend-card__title { font-weight:700; font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pend-card__sub   { font-size:.78rem; color:rgba(255,255,255,.5); margin-top:2px; }
  .pend-card__meta  { display:flex; gap:10px; flex-wrap:wrap; font-size:.8rem; color:rgba(255,255,255,.6); }
  .pend-card__meta strong { color:rgba(255,255,255,.85); }
  .pend-card__status {
    font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:20px;
    background:rgba(255,176,32,.15); color:#FFB020; white-space:nowrap;
  }
  .pend-card__status.aguard { background:rgba(52,152,219,.12); color:#3498DB; }
  .pend-card__acoes { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; padding-top:10px; border-top:1px solid rgba(255,255,255,.07); }

  .empty-pendentes {
    text-align:center; padding:60px 20px;
    color:rgba(255,255,255,.4);
  }
  .empty-pendentes i { font-size:3rem; margin-bottom:16px; display:block; color:rgba(46,204,113,.4); }

  .filtro-tabs { display:flex; gap:8px; margin-bottom:20px; }
  .filtro-tab  {
    padding:7px 18px; border-radius:20px; font-size:.83rem; font-weight:600; cursor:pointer;
    border:1.5px solid rgba(255,255,255,.1); background:transparent; color:rgba(255,255,255,.6);
    transition: all .15s;
  }
  .filtro-tab.ativo { background:rgba(255,176,32,.15); border-color:rgba(255,176,32,.4); color:#FFB020; }
  .filtro-tab:hover:not(.ativo) { border-color:rgba(255,255,255,.2); color:rgba(255,255,255,.9); }
</style>
</head>
<body>
<div id="appShell" class="app-shell">
  <main id="conteudoPagina">

    <!-- KPIs -->
    <div class="row g-3 mb-4" id="kpisPendentes" data-aos="fade-up"></div>

    <!-- Filtros -->
    <div class="filtro-tabs" data-aos="fade-up">
      <button class="filtro-tab ativo" onclick="filtrar('todos',this)">
        Todos <span id="badgeTodos" style="margin-left:4px;"></span>
      </button>
      <button class="filtro-tab" onclick="filtrar('abastecimento',this)">
        <i class="fa-solid fa-gas-pump"></i> Abastecimentos
        <span id="badgeAbast" style="margin-left:4px;"></span>
      </button>
      <button class="filtro-tab" onclick="filtrar('manutencao',this)">
        <i class="fa-solid fa-screwdriver-wrench"></i> Manutenções
        <span id="badgeManut" style="margin-left:4px;"></span>
      </button>
    </div>

    <!-- Lista -->
    <div id="listaPendentes" data-aos="fade-up">
      <div class="empty-pendentes"><i class="fa-solid fa-hourglass"></i>Carregando...</div>
    </div>

  </main>
</div>

<!-- Modal: Regularizar (admin) -->
<div class="modal fade" id="modalRegularizarPend" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px;border:none;">
      <div class="modal-header" style="border-bottom:1px solid var(--cinza-200);">
        <h5 class="modal-title fonte-display fw-bold" id="tituloModalPend">Regularizar</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="infoModalPend" class="mb-3" style="background:var(--cinza-100);border-radius:10px;padding:12px 14px;font-size:.85rem;"></div>
        <input type="hidden" id="pendId">
        <input type="hidden" id="pendTipo">
        <div class="mb-3">
          <label class="form-label-gr">Decisão</label>
          <div class="d-flex gap-3 flex-wrap">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="decisaoPend" id="optPendAprovar" value="aprovar" checked>
              <label class="form-check-label fw-bold" for="optPendAprovar" style="color:var(--sucesso);">
                <i class="fa-solid fa-check"></i> Aprovar (sem penalidade)
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="decisaoPend" id="optPendPenalizar" value="penalizar">
              <label class="form-check-label fw-bold" for="optPendPenalizar" style="color:var(--perigo);">
                <i class="fa-solid fa-gavel"></i> Penalizar motorista
              </label>
            </div>
          </div>
        </div>
        <div>
          <label class="form-label-gr">Observação (opcional)</label>
          <textarea class="form-control" id="pendObs" rows="2" placeholder="Motivo da decisão..."></textarea>
        </div>
      </div>
      <div class="modal-footer" style="border-top:1px solid var(--cinza-200);">
        <button type="button" class="btn-gr-outline" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn-gr-primario" id="btnConfirmarPend">
          <i class="fa-solid fa-check-double"></i> Confirmar
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/pendentes.js"></script>
</body>
</html>
