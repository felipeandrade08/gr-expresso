<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Motoristas | GR EXPRESSO</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3" data-aos="fade-up">
      <div class="d-flex gap-2">
        <div class="busca-topbar" style="position:static;">
          <div class="position-relative">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="campoBusca" placeholder="Buscar motorista..." style="width:240px;">
          </div>
        </div>
        <select class="form-select" id="filtroStatus" style="width:160px;">
          <option value="">Todos os status</option>
          <option value="ativo">Ativo</option>
          <option value="ferias">Férias</option>
          <option value="suspenso">Suspenso</option>
          <option value="inativo">Inativo</option>
        </select>
      </div>
      <button class="btn-gr-primario" id="btnNovoMotorista">
        <i class="fa-solid fa-plus"></i> Novo Motorista
      </button>
    </div>

    <div class="card-gr" data-aos="fade-up">
      <div class="table-responsive">
        <table class="tabela-gr">
          <thead>
            <tr>
              <th>Motorista</th><th>CNH</th><th>Contato</th><th>Viagens</th><th>KM total</th><th>Faturado</th><th>Status</th><th></th>
            </tr>
          </thead>
          <tbody id="corpoTabelaMotoristas">
            <tr><td colspan="8" class="text-center text-muted py-4">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal de cadastro/edição -->
<div class="modal fade" id="modalMotorista" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="border-radius:16px; border:none;">
      <div class="modal-header" style="border-bottom:1px solid var(--cinza-200);">
        <h5 class="modal-title fonte-display fw-bold" id="tituloModalMotorista">Novo Motorista</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="formMotorista">
        <div class="modal-body">
          <input type="hidden" id="motoristaId">
          <div class="row g-3">
            <div class="col-md-7">
              <label class="form-label-gr">Nome completo *</label>
              <input type="text" class="form-control" id="campoNome" required>
            </div>
            <div class="col-md-5">
              <label class="form-label-gr">Apelido (gamertag)</label>
              <input type="text" class="form-control" id="campoApelido">
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">CNH</label>
              <input type="text" class="form-control" id="campoCnh">
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">Telefone</label>
              <input type="text" class="form-control" id="campoTelefone">
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">E-mail</label>
              <input type="email" class="form-control" id="campoEmail">
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Steam ID</label>
              <input type="text" class="form-control" id="campoSteamId">
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Data de admissão</label>
              <input type="date" class="form-control" id="campoDataAdmissao">
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Status</label>
              <select class="form-select" id="campoStatus">
                <option value="ativo">Ativo</option>
                <option value="ferias">Férias</option>
                <option value="suspenso">Suspenso</option>
                <option value="inativo">Inativo</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label-gr">Observações</label>
              <textarea class="form-control" id="campoObservacoes" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--cinza-200);">
          <button type="button" class="btn-gr-outline" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn-gr-primario"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/motoristas.js"></script>
</body>
</html>
