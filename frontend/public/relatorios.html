<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relatórios | FELIPINHO LAUNCHER</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="row g-3 mb-4">
      <div class="col-12" data-aos="fade-up">
        <div class="card-gr">
          <div class="card-gr__header"><h3>Lucratividade (faturamento x custos)</h3></div>
          <div class="card-gr__body"><canvas id="graficoLucratividade" height="90"></canvas></div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-lg-6" data-aos="fade-up">
        <div class="card-gr h-100">
          <div class="card-gr__header"><h3>Desempenho por motorista</h3></div>
          <div class="table-responsive">
            <table class="tabela-gr">
              <thead><tr><th>Motorista</th><th>Viagens</th><th>KM</th><th>Faturado</th></tr></thead>
              <tbody id="corpoDesempenhoMotoristas"><tr><td colspan="4" class="text-center text-muted py-4">Carregando...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-lg-6" data-aos="fade-up" data-aos-delay="50">
        <div class="card-gr h-100">
          <div class="card-gr__header"><h3>Custo por caminhão</h3></div>
          <div class="table-responsive">
            <table class="tabela-gr">
              <thead><tr><th>Caminhão</th><th>Combustível</th><th>Despesas</th><th>Total</th></tr></thead>
              <tbody id="corpoCustoCaminhao"><tr><td colspan="4" class="text-center text-muted py-4">Carregando...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-12" data-aos="fade-up">
        <div class="card-gr">
          <div class="card-gr__header"><h3>Rotas mais frequentes</h3></div>
          <div class="table-responsive">
            <table class="tabela-gr">
              <thead><tr><th>Rota</th><th>Viagens</th><th>Distância média</th><th>Faturamento total</th></tr></thead>
              <tbody id="corpoRotasFrequentes"><tr><td colspan="4" class="text-center text-muted py-4">Carregando...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/relatorios.js"></script>
</body>
</html>
