<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Despesas | GR EXPRESSO</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="row g-3 mb-4">
      <div class="col-lg-5" data-aos="fade-up">
        <div class="card-gr h-100">
          <div class="card-gr__header"><h3>Despesas por categoria</h3></div>
          <div class="card-gr__body d-flex align-items-center justify-content-center">
            <canvas id="graficoCategorias" height="220"></canvas>
          </div>
        </div>
      </div>
      <div class="col-lg-7" data-aos="fade-up" data-aos-delay="50">
        <div class="row g-3 h-100">
          <div class="col-6" id="cardTotalDespesas"></div>
          <div class="col-6" id="cardQtdDespesas"></div>
        </div>
      </div>
    </div>

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3" data-aos="fade-up">
      <div class="d-flex gap-2 flex-wrap">
        <select class="form-select" id="filtroCategoria" style="width:190px;">
          <option value="">Todas as categorias</option>
          <option value="manutencao">Manutenção</option>
          <option value="pneus">Pneus</option>
          <option value="multa">Multa</option>
          <option value="pedagio">Pedágio</option>
          <option value="seguro">Seguro</option>
          <option value="salario">Salário</option>
          <option value="administrativa">Administrativa</option>
          <option value="outra">Outra</option>
        </select>
        <input type="date" class="form-control" id="filtroDataInicio" style="width:160px;">
        <input type="date" class="form-control" id="filtroDataFim" style="width:160px;">
      </div>
      <button class="btn-gr-primario" id="btnNovaDespesa"><i class="fa-solid fa-plus"></i> Nova Despesa</button>
    </div>

    <div class="card-gr" data-aos="fade-up">
      <div class="table-responsive">
        <table class="tabela-gr">
          <thead>
            <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Vínculo</th><th>Valor</th><th>Pagamento</th><th></th></tr>
          </thead>
          <tbody id="corpoTabelaDespesas">
            <tr><td colspan="7" class="text-center text-muted py-4">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal fade" id="modalDespesa" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="border-radius:16px; border:none;">
      <div class="modal-header" style="border-bottom:1px solid var(--cinza-200);">
        <h5 class="modal-title fonte-display fw-bold" id="tituloModalDespesa">Nova Despesa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="formDespesa">
        <div class="modal-body">
          <input type="hidden" id="despesaId">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-gr">Descrição *</label>
              <input type="text" class="form-control" id="campoDescricao" required>
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Categoria *</label>
              <select class="form-select" id="campoCategoria" required>
                <option value="manutencao">Manutenção</option>
                <option value="pneus">Pneus</option>
                <option value="multa">Multa</option>
                <option value="pedagio">Pedágio</option>
                <option value="seguro">Seguro</option>
                <option value="salario">Salário</option>
                <option value="administrativa">Administrativa</option>
                <option value="outra">Outra</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">Caminhão</label>
              <select class="form-select" id="campoCaminhaoId"><option value="">Não vinculado</option></select>
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">Reboque</label>
              <select class="form-select" id="campoReboqueId"><option value="">Não vinculado</option></select>
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">Motorista</label>
              <select class="form-select" id="campoMotoristaId"><option value="">Não vinculado</option></select>
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">Valor (R$) *</label>
              <input type="number" step="0.01" class="form-control" id="campoValor" required>
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">Data *</label>
              <input type="date" class="form-control" id="campoDataDespesa" required>
            </div>
            <div class="col-md-4">
              <label class="form-label-gr">Forma de pagamento</label>
              <select class="form-select" id="campoFormaPagamento">
                <option value="dinheiro">Dinheiro</option>
                <option value="transferencia">Transferência</option>
                <option value="cartao">Cartão</option>
                <option value="outro">Outro</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label-gr">Observações</label>
              <textarea class="form-control" id="campoObservacoes" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--cinza-200);">
          <button type="button" class="btn-gr-outline" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn-gr-primario"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/despesas.js"></script>
</body>
</html>
