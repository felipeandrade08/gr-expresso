<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recrutamentos | GR EXPRESSO</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>
<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="text-center text-muted py-5">Carregando...</div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script>
(async function () {
  if (!AuthService.ehRH()) {
    window.location.href = 'dashboard.html';
    return;
  }

  montarLayout({ paginaAtiva: 'recrutamentos', titulo: 'Recrutamentos', subtitulo: 'Gerencie os candidatos à GR Expresso' });
  AOS.init({ duration: 500, once: true });

  const main = document.getElementById('conteudoPagina');
  main.innerHTML = `
    <div class="d-flex gap-2 mb-4 flex-wrap" data-aos="fade-up">
      <button class="btn-gr-primario filtro-btn ativo" data-status="">Todos</button>
      <button class="btn-gr-outline filtro-btn" data-status="pendente"><i class="fa-solid fa-clock me-1"></i>Pendentes</button>
      <button class="btn-gr-outline filtro-btn" data-status="aprovado"><i class="fa-solid fa-check me-1"></i>Aprovados</button>
      <button class="btn-gr-outline filtro-btn" data-status="rejeitado"><i class="fa-solid fa-xmark me-1"></i>Rejeitados</button>
      <a href="recrutamento.html" target="_blank" class="btn-gr-outline ms-auto">
        <i class="fa-solid fa-external-link-alt me-1"></i>Ver formulário público
      </a>
    </div>

    <div class="card-gr" data-aos="fade-up">
      <div class="card-gr__header">
        <h3><i class="fa-solid fa-user-plus me-2" style="color:var(--verde-limao)"></i>Candidatos</h3>
      </div>
      <div class="table-responsive">
        <table class="tabela-gr">
          <thead>
            <tr>
              <th>Nome / Apelido</th>
              <th>Discord</th>
              <th>Idade</th>
              <th>Experiência</th>
              <th>Como conheceu</th>
              <th>Status</th>
              <th>Enviado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoRecrutamentos">
            <tr><td colspan="8" class="text-center text-muted py-4">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  let filtroAtual = '';

  document.querySelectorAll('.filtro-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filtro-btn').forEach(b => { b.classList.remove('ativo','btn-gr-primario'); b.classList.add('btn-gr-outline'); });
      btn.classList.add('ativo','btn-gr-primario'); btn.classList.remove('btn-gr-outline');
      filtroAtual = btn.dataset.status;
      carregarRecrutamentos(filtroAtual);
    });
  });

  await carregarRecrutamentos('');
})();

async function carregarRecrutamentos(status) {
  const corpo = document.getElementById('corpoRecrutamentos');
  corpo.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4"><i class="fa-solid fa-spinner fa-spin me-2"></i>Carregando...</td></tr>';

  try {
    const url = status ? `/recrutamentos?status=${status}` : '/recrutamentos';
    const lista = await ApiService.get(url);

    if (!lista.length) {
      corpo.innerHTML = '<tr><td colspan="8"><div class="estado-vazio"><i class="fa-solid fa-inbox"></i><h4>Nenhum candidato encontrado</h4></div></td></tr>';
      return;
    }

    const statusConfig = {
      pendente:  { classe: 'status-pendente',  icone: 'fa-clock',   label: 'Pendente' },
      aprovado:  { classe: 'status-ativo',     icone: 'fa-check',   label: 'Aprovado' },
      rejeitado: { classe: 'status-inativo',   icone: 'fa-xmark',   label: 'Rejeitado' }
    };

    corpo.innerHTML = lista.map(r => {
      const cfg = statusConfig[r.status] || statusConfig.pendente;
      const data = new Date(r.criado_em).toLocaleDateString('pt-BR');
      return `
        <tr>
          <td>
            <div class="fw-semibold">${r.nome}</div>
            ${r.apelido ? `<div class="text-muted" style="font-size:0.74rem;">${r.apelido}</div>` : ''}
          </td>
          <td>
            <span style="font-family:monospace;font-size:0.85rem;">${r.discord_user}</span>
          </td>
          <td>${r.idade || '—'}</td>
          <td style="max-width:200px;">
            <div style="font-size:0.8rem;line-height:1.4;max-height:56px;overflow:hidden;color:rgba(255,255,255,0.7);">
              ${r.experiencia || '—'}
            </div>
          </td>
          <td style="font-size:0.82rem;color:rgba(255,255,255,0.6);">${r.como_conheceu || '—'}</td>
          <td><span class="badge-status ${cfg.classe}"><i class="fa-solid ${cfg.icone}"></i> ${cfg.label}</span></td>
          <td style="font-size:0.8rem;color:rgba(255,255,255,0.5);">${data}</td>
          <td>
            <div class="d-flex gap-1">
              ${r.status !== 'aprovado' ? `<button class="btn btn-sm btn-success" onclick="alterarStatus(${r.id},'aprovado')" title="Aprovar"><i class="fa-solid fa-check"></i></button>` : ''}
              ${r.status !== 'rejeitado' ? `<button class="btn btn-sm btn-danger" onclick="alterarStatus(${r.id},'rejeitado')" title="Rejeitar"><i class="fa-solid fa-xmark"></i></button>` : ''}
              ${r.status !== 'pendente' ? `<button class="btn btn-sm btn-secondary" onclick="alterarStatus(${r.id},'pendente')" title="Mover para pendente"><i class="fa-solid fa-rotate-left"></i></button>` : ''}
            </div>
          </td>
        </tr>
      `;
    }).join('');
  } catch (e) {
    corpo.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-3">Erro ao carregar: ${e.message}</td></tr>`;
  }
}

async function alterarStatus(id, status) {
  const labels = { aprovado: 'Aprovar', rejeitado: 'Rejeitar', pendente: 'Mover para pendente' };
  const { isConfirmed } = await Swal.fire({
    title: `${labels[status]} candidato?`,
    icon: status === 'aprovado' ? 'success' : 'question',
    showCancelButton: true,
    confirmButtonText: labels[status],
    cancelButtonText: 'Cancelar',
    confirmButtonColor: status === 'aprovado' ? '#0B3D2E' : '#dc3545'
  });

  if (!isConfirmed) return;

  try {
    await ApiService.patch(`/recrutamentos/${id}/status`, { status });
    Swal.fire({ icon: 'success', title: 'Status atualizado!', timer: 1500, showConfirmButton: false });
    carregarRecrutamentos(document.querySelector('.filtro-btn.ativo')?.dataset.status || '');
  } catch (e) {
    Swal.fire({ icon: 'error', title: 'Erro', text: e.message });
  }
}
</script>
</body>
</html>
