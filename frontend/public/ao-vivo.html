<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ao Vivo | GR EXPRESSO</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
<style>
/* ── Barra de status geral ── */
.ao-vivo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
}

.ao-vivo-contador {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--fonte-display);
  font-size: 0.85rem;
  color: var(--cinza-600);
}

.pulso {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--sucesso);
  box-shadow: 0 0 0 0 rgba(46,204,113,0.6);
  animation: pulso 2s infinite;
}

@keyframes pulso {
  0%   { box-shadow: 0 0 0 0 rgba(46,204,113,0.55); }
  70%  { box-shadow: 0 0 0 10px rgba(46,204,113,0); }
  100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
}

.atualizado-em {
  font-size: 0.78rem;
  color: var(--cinza-400);
}

/* ── Cards de motorista ── */
.grid-motoristas {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}

.card-motorista {
  background: #fff;
  border-radius: var(--raio);
  border: 1px solid var(--cinza-200);
  box-shadow: var(--sombra);
  overflow: hidden;
  transition: transform var(--transicao), box-shadow var(--transicao);
  position: relative;
}

.card-motorista:hover {
  transform: translateY(-2px);
  box-shadow: var(--sombra-elevada);
}

.card-motorista--offline {
  opacity: 0.55;
  filter: grayscale(0.4);
}

/* Faixa de status no topo */
.card-motorista__faixa {
  height: 4px;
  background: var(--cinza-200);
}
.card-motorista--online .card-motorista__faixa  { background: var(--sucesso); }
.card-motorista--viagem .card-motorista__faixa  { background: var(--verde-limao); }
.card-motorista--offline .card-motorista__faixa { background: var(--cinza-400); }

/* Cabeçalho do card */
.card-motorista__head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px 12px;
}

.card-motorista__avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--verde-escuro);
  color: var(--verde-limao);
  font-family: var(--fonte-display);
  font-weight: 700;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

.card-motorista__info { flex: 1; min-width: 0; }

.card-motorista__nome {
  font-family: var(--fonte-display);
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--preto);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-motorista__perfil {
  font-size: 0.75rem;
  color: var(--cinza-600);
  margin-top: 1px;
}

.card-motorista__badge {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 3px 9px;
  border-radius: 99px;
}
.badge-em-viagem { background: rgba(164,255,0,0.15); color: #4A7A00; border: 1px solid rgba(164,255,0,0.3); }
.badge-online    { background: rgba(46,204,113,0.14); color: #1E9E58; border: 1px solid rgba(46,204,113,0.25); }
.badge-offline   { background: rgba(92,100,95,0.12); color: var(--cinza-600); border: 1px solid rgba(92,100,95,0.2); }

/* Bloco de rota */
.card-motorista__rota {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: var(--cinza-100);
  border-top: 1px solid var(--cinza-200);
  border-bottom: 1px solid var(--cinza-200);
  font-size: 0.8rem;
}

.rota-cidade {
  font-weight: 600;
  color: var(--preto);
  font-size: 0.82rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
}
.rota-seta { color: var(--cinza-400); font-size: 0.75rem; flex-shrink: 0; }
.rota-sem { color: var(--cinza-400); font-style: italic; font-size: 0.78rem; }

/* Grid de métricas */
.card-motorista__metricas {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}

.metrica {
  padding: 14px 12px;
  text-align: center;
  border-right: 1px solid var(--cinza-200);
  border-top: 1px solid var(--cinza-200);
}
.metrica:last-child { border-right: none; }

.metrica__valor {
  font-family: var(--fonte-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--preto);
  line-height: 1;
}

.metrica__label {
  font-size: 0.68rem;
  color: var(--cinza-600);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

.metrica--destaque .metrica__valor { color: var(--verde-escuro); }
.metrica--alerta .metrica__valor   { color: var(--alerta); }
.metrica--perigo .metrica__valor   { color: var(--perigo); }

/* Barra de combustível */
.card-motorista__combustivel {
  padding: 12px 18px;
  border-top: 1px solid var(--cinza-200);
}

.barra-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: var(--cinza-600);
  margin-bottom: 6px;
}

.barra-label span:last-child { font-weight: 600; }

.barra-track {
  height: 6px;
  background: var(--cinza-200);
  border-radius: 99px;
  overflow: hidden;
}

.barra-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 1s ease;
}

.barra-fill--ok      { background: var(--verde-limao); }
.barra-fill--medio   { background: var(--alerta); }
.barra-fill--critico { background: var(--perigo); }

/* Rodapé do card com caminhão */
.card-motorista__rodape {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  border-top: 1px solid var(--cinza-200);
  font-size: 0.75rem;
  color: var(--cinza-600);
}

.rodape-caminhao { display: flex; align-items: center; gap: 6px; }
.rodape-caminhao i { color: var(--verde-escuro); }

.rodape-tempo { font-size: 0.7rem; color: var(--cinza-400); }

/* ── Estado vazio ── */
.estado-vazio {
  text-align: center;
  padding: 64px 20px;
  color: var(--cinza-400);
}
.estado-vazio i {
  font-size: 2.5rem;
  margin-bottom: 16px;
  display: block;
  color: var(--cinza-200);
}
.estado-vazio p { font-size: 0.9rem; margin: 0; }

/* ── Painel de resumo topo ── */
.resumo-cards {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.resumo-card {
  flex: 1;
  min-width: 130px;
  background: #fff;
  border: 1px solid var(--cinza-200);
  border-radius: var(--raio);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--sombra);
}

.resumo-card__icone {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}

.bg-verde  { background: rgba(11,61,46,0.1); color: var(--verde-escuro); }
.bg-limao  { background: rgba(164,255,0,0.2); color: #5A8E00; }
.bg-alerta { background: rgba(255,176,32,0.15); color: #B8780A; }
.bg-cinza  { background: rgba(92,100,95,0.1); color: var(--cinza-600); }

.resumo-card__num {
  font-family: var(--fonte-display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--preto);
  line-height: 1;
}
.resumo-card__label {
  font-size: 0.72rem;
  color: var(--cinza-600);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">

    <!-- Cabeçalho ao vivo -->
    <div class="ao-vivo-header" data-aos="fade-up">
      <div class="ao-vivo-contador">
        <span class="pulso"></span>
        <span id="labelOnline">Aguardando dados...</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="atualizado-em" id="labelAtualizado"></span>
        <button class="btn-gr-outline btn-sm" id="btnAtualizar" style="font-size:0.8rem;">
          <i class="fa-solid fa-rotate-right"></i> Atualizar
        </button>
      </div>
    </div>

    <!-- Cards de resumo -->
    <div class="resumo-cards" data-aos="fade-up" data-aos-delay="50" id="resumoCards">
      <div class="resumo-card">
        <div class="resumo-card__icone bg-verde"><i class="fa-solid fa-circle-dot"></i></div>
        <div><div class="resumo-card__num" id="numOnline">—</div><div class="resumo-card__label">Online agora</div></div>
      </div>
      <div class="resumo-card">
        <div class="resumo-card__icone bg-limao"><i class="fa-solid fa-route"></i></div>
        <div><div class="resumo-card__num" id="numViagem">—</div><div class="resumo-card__label">Em viagem</div></div>
      </div>
      <div class="resumo-card">
        <div class="resumo-card__icone bg-alerta"><i class="fa-solid fa-gauge-high"></i></div>
        <div><div class="resumo-card__num" id="numVelMedia">— km/h</div><div class="resumo-card__label">Vel. média</div></div>
      </div>
      <div class="resumo-card">
        <div class="resumo-card__icone bg-cinza"><i class="fa-solid fa-power-off"></i></div>
        <div><div class="resumo-card__num" id="numOffline">—</div><div class="resumo-card__label">Offline</div></div>
      </div>
    </div>

    <!-- Grid de motoristas -->
    <div class="grid-motoristas" id="gridMotoristas" data-aos="fade-up" data-aos-delay="100">
      <div class="estado-vazio" style="grid-column:1/-1;">
        <i class="fa-solid fa-satellite-dish"></i>
        <p>Carregando dados de telemetria...</p>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/ao-vivo.js"></script>
</body>
</html>
