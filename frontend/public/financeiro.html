<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Financeiro | FELIPINHO LAUNCHER</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="row g-3 mb-4" id="gridResumoFinanceiro" data-aos="fade-up"></div>

    <div class="row g-3 mb-4">
      <div class="col-12" data-aos="fade-up">
        <div class="card-gr">
          <div class="card-gr__header"><h3>Fluxo de caixa (últimos 6 meses)</h3></div>
          <div class="card-gr__body"><canvas id="graficoFluxo" height="90"></canvas></div>
        </div>
      </div>
    </div>

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3" data-aos="fade-up">
      <div class="d-flex gap-2 flex-wrap">
        <select class="form-select" id="filtroTipo" style="width:170px;">
          <option value="">Todos os tipos</option>
          <option value="entrada">Entradas</option>
          <option value="saida">Saídas</option>
        </select>
        <input type="date" class="form-control" id="filtroDataInicio" style="width:160px;">
        <input type="date" class="form-control" id="filtroDataFim" style="width:160px;">
      </div>
      <button class="btn-gr-primario" id="btnNovoLancamento"><i class="fa-solid fa-plus"></i> Novo Lançamento</button>
    </div>

    <div class="card-gr" data-aos="fade-up">
      <div class="table-responsive">
        <table class="tabela-gr">
          <thead>
            <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Tipo</th><th>Valor</th><th></th></tr>
          </thead>
          <tbody id="corpoTabelaFinanceiro">
            <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal fade" id="modalLancamento" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px; border:none;">
      <div class="modal-header" style="border-bottom:1px solid var(--cinza-200);">
        <h5 class="modal-title fonte-display fw-bold" id="tituloModalLancamento">Novo Lançamento</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="formLancamento">
        <div class="modal-body">
          <input type="hidden" id="lancamentoId">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label-gr">Tipo *</label>
              <select class="form-select" id="campoTipo" required>
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label-gr">Descrição *</label>
              <input type="text" class="form-control" id="campoDescricao" required>
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Categoria *</label>
              <input type="text" class="form-control" id="campoCategoria" required placeholder="Ex: Frete, Combustível...">
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Valor (R$) *</label>
              <input type="number" step="0.01" class="form-control" id="campoValor" required>
            </div>
            <div class="col-12">
              <label class="form-label-gr">Data do lançamento *</label>
              <input type="date" class="form-control" id="campoDataLancamento" required>
            </div>
            <div class="col-12">
              <label class="form-label-gr">Observações</label>
              <textarea class="form-control" id="campoObservacoes" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--cinza-200);">
          <button type="button" class="btn-gr-outline" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn-gr-primario"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/financeiro.js"></script>
</body>
</html>
