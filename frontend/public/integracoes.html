<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Integrações | GR EXPRESSO</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
<style>
  .card-integracao__logo {
    width: 52px; height: 52px; border-radius: 14px; display:flex; align-items:center; justify-content:center;
    font-size: 1.4rem; background: var(--verde-escuro); color: var(--verde-limao); flex-shrink:0;
  }
  .switch-integracao { width: 44px; height: 24px; }
</style>
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="alert mb-4" style="background:rgba(164,255,0,0.1); border:1px solid rgba(164,255,0,0.35); border-radius:var(--raio-sm); font-size:0.85rem;" data-aos="fade-up">
      <i class="fa-solid fa-circle-info me-2" style="color:var(--verde-escuro)"></i>
      Estas integrações estão <b>preparadas na estrutura do sistema</b>, mas a sincronização automática de dados ainda está em desenvolvimento. Configure as credenciais para deixá-las prontas para quando forem habilitadas.
    </div>

    <div class="row g-3" id="gridIntegracoes" data-aos="fade-up">
      <div class="col-12 text-center text-muted py-5">Carregando integrações...</div>
    </div>
  </main>
</div>

<!-- Modal de configuração -->
<div class="modal fade" id="modalIntegracao" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px; border:none;">
      <div class="modal-header" style="border-bottom:1px solid var(--cinza-200);">
        <h5 class="modal-title fonte-display fw-bold" id="tituloModalIntegracao">Configurar Integração</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="formIntegracao">
        <div class="modal-body">
          <input type="hidden" id="integracaoNome">
          <div class="row g-3">
            <div class="col-12 d-flex align-items-center justify-content-between p-3 rounded-3" style="background:var(--cinza-100);">
              <span class="fw-semibold" style="font-size:0.88rem;">Ativar integração</span>
              <div class="form-check form-switch m-0">
                <input class="form-check-input switch-integracao" type="checkbox" id="campoAtiva" style="cursor:pointer;">
              </div>
            </div>
            <div class="col-12">
              <label class="form-label-gr">URL do endpoint</label>
              <input type="text" class="form-control" id="campoUrlEndpoint" placeholder="https://api.exemplo.com/...">
            </div>
            <div class="col-12">
              <label class="form-label-gr">Chave de API (API Key)</label>
              <input type="text" class="form-control" id="campoApiKey" placeholder="Cole aqui sua chave de acesso">
            </div>
          </div>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--cinza-200);">
          <button type="button" class="btn-gr-outline" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn-gr-primario"><i class="fa-solid fa-floppy-disk"></i> Salvar configuração</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/integracoes.js"></script>
</body>
</html>
