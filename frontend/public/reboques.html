<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reboques | GR EXPRESSO</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3" data-aos="fade-up">
      <div class="d-flex gap-2">
        <select class="form-select" id="filtroTipo" style="width:180px;">
          <option value="">Todos os tipos</option>
          <option value="bau">Baú</option>
          <option value="graneleiro">Graneleiro</option>
          <option value="tanque">Tanque</option>
          <option value="plataforma">Plataforma</option>
          <option value="frigorifico">Frigorífico</option>
          <option value="cacamba">Caçamba</option>
          <option value="outro">Outro</option>
        </select>
        <select class="form-select" id="filtroStatus" style="width:170px;">
          <option value="">Todos os status</option>
          <option value="disponivel">Disponível</option>
          <option value="em_uso">Em uso</option>
          <option value="manutencao">Manutenção</option>
          <option value="inativo">Inativo</option>
        </select>
      </div>
      <button class="btn-gr-primario" id="btnNovoReboque"><i class="fa-solid fa-plus"></i> Novo Reboque</button>
    </div>

    <div class="card-gr" data-aos="fade-up">
      <div class="table-responsive">
        <table class="tabela-gr">
          <thead>
            <tr><th>Placa</th><th>Tipo</th><th>Capacidade</th><th>Caminhão vinculado</th><th>Status</th><th></th></tr>
          </thead>
          <tbody id="corpoTabelaReboques">
            <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal fade" id="modalReboque" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px; border:none;">
      <div class="modal-header" style="border-bottom:1px solid var(--cinza-200);">
        <h5 class="modal-title fonte-display fw-bold" id="tituloModalReboque">Novo Reboque</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="formReboque">
        <div class="modal-body">
          <input type="hidden" id="reboqueId">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label-gr">Placa *</label>
              <input type="text" class="form-control text-uppercase" id="campoPlaca" required>
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Tipo</label>
              <select class="form-select" id="campoTipo">
                <option value="bau">Baú</option>
                <option value="graneleiro">Graneleiro</option>
                <option value="tanque">Tanque</option>
                <option value="plataforma">Plataforma</option>
                <option value="frigorifico">Frigorífico</option>
                <option value="cacamba">Caçamba</option>
                <option value="outro">Outro</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Capacidade de carga (toneladas)</label>
              <input type="number" step="0.01" class="form-control" id="campoCapacidadeCarga">
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Status</label>
              <select class="form-select" id="campoStatus">
                <option value="disponivel">Disponível</option>
                <option value="em_uso">Em uso</option>
                <option value="manutencao">Manutenção</option>
                <option value="inativo">Inativo</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label-gr">Valor de aquisição (R$)</label>
              <input type="number" step="0.01" class="form-control" id="campoValorAquisicao">
            </div>
            <div class="col-12">
              <label class="form-label-gr">Observações</label>
              <textarea class="form-control" id="campoObservacoes" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--cinza-200);">
          <button type="button" class="btn-gr-outline" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn-gr-primario"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/reboques.js"></script>
</body>
</html>
