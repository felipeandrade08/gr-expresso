<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aprovações de Acesso | FELIPINHO LAUNCHER</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="row g-3 mb-4" id="gridResumoAprovacoes" data-aos="fade-up"></div>

    <div class="card-gr mb-4" data-aos="fade-up">
      <div class="card-gr__header">
        <h3><i class="fa-solid fa-user-clock me-2" style="color:var(--alerta)"></i>Aguardando aprovação</h3>
      </div>
      <div class="table-responsive">
        <table class="tabela-gr">
          <thead>
            <tr><th>Nome</th><th>E-mail</th><th>Cadastrado em</th><th></th></tr>
          </thead>
          <tbody id="corpoTabelaPendentes">
            <tr><td colspan="4" class="text-center text-muted py-4">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card-gr" data-aos="fade-up">
      <div class="card-gr__header">
        <h3>Todos os usuários do sistema</h3>
        <select class="form-select" id="filtroStatusUsuarios" style="width:170px;">
          <option value="">Todos os status</option>
          <option value="aprovado">Aprovados</option>
          <option value="pendente">Pendentes</option>
          <option value="rejeitado">Rejeitados</option>
        </select>
      </div>
      <div class="table-responsive">
        <table class="tabela-gr">
          <thead>
            <tr><th>Nome / Nível</th><th>E-mail</th><th>Cargo</th><th>Status</th><th>Último login</th><th>Alterar Cargo</th><th>Ações</th></tr>
          </thead>
          <tbody id="corpoTabelaTodos">
            <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/aprovacoes.js"></script>
</body>
</html>
