<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frota de Ônibus | GR EXPRESSO</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
<style>
/* ── Filtros ── */
.barra-filtros {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.busca-onibus {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}
.busca-onibus i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--cinza-400);
  font-size: 0.85rem;
  pointer-events: none;
}
.busca-onibus input {
  padding-left: 34px;
  height: 38px;
  font-size: 0.85rem;
}

/* ── Abas de modshop ── */
.abas-modshop {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.aba-modshop {
  padding: 6px 14px;
  border-radius: 99px;
  border: 1.5px solid var(--cinza-200);
  background: #fff;
  color: var(--cinza-600);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transicao);
  font-family: var(--fonte-corpo);
  letter-spacing: 0.02em;
}

.aba-modshop:hover {
  border-color: var(--verde-escuro);
  color: var(--verde-escuro);
}

.aba-modshop.ativa {
  background: var(--verde-escuro);
  color: var(--verde-limao);
  border-color: var(--verde-escuro);
}

/* ── Stats rápidos ── */
.stats-onibus {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 22px;
}

.stat-onibus {
  background: #fff;
  border: 1px solid var(--cinza-200);
  border-radius: var(--raio);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--sombra);
  flex: 1;
  min-width: 130px;
}

.stat-onibus__icone {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
}

.bg-verde  { background: rgba(11,61,46,0.1); color: var(--verde-escuro); }
.bg-limao  { background: rgba(164,255,0,0.2); color: #5A8E00; }
.bg-alerta { background: rgba(255,176,32,0.15); color: #B8780A; }
.bg-info   { background: rgba(58,166,255,0.14); color: #1A77C9; }

.stat-onibus__num {
  font-family: var(--fonte-display);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--preto);
  line-height: 1;
}
.stat-onibus__label {
  font-size: 0.68rem;
  color: var(--cinza-600);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* ── Tabela customizada ── */
.tabela-gr th { white-space: nowrap; }

.prefixo-tag {
  display: inline-block;
  font-family: var(--fonte-display);
  font-weight: 700;
  font-size: 0.75rem;
  padding: 3px 8px;
  background: var(--verde-escuro);
  color: var(--verde-limao);
  border-radius: 6px;
  letter-spacing: 0.05em;
}

.modshop-tag {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;
  border: 1px solid var(--cinza-200);
  color: var(--cinza-600);
  background: var(--cinza-100);
}

/* Cores por modshop */
.modshop-Modshop    { background: rgba(11,61,46,0.1); color: var(--verde-escuro); border-color: rgba(11,61,46,0.2); }
.modshop-NormanMods { background: rgba(58,166,255,0.12); color: #1A77C9; border-color: rgba(58,166,255,0.25); }
.modshop-B4D        { background: rgba(255,176,32,0.12); color: #B8780A; border-color: rgba(255,176,32,0.25); }
.modshop-BRT        { background: rgba(164,255,0,0.18); color: #4A7A00; border-color: rgba(164,255,0,0.3); }
.modshop-Outro      { background: rgba(92,100,95,0.1); color: var(--cinza-600); border-color: var(--cinza-200); }

.limpeza-sim { color: var(--perigo); font-weight: 600; font-size: 0.78rem; }
.limpeza-nao { color: var(--sucesso); font-size: 0.78rem; }

/* Linha em viagem */
.linha-tag {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--preto);
}

/* Ações inline */
.btn-acao {
  padding: 4px 10px;
  font-size: 0.72rem;
  border-radius: 7px;
  border: 1.5px solid var(--cinza-200);
  background: #fff;
  color: var(--cinza-600);
  cursor: pointer;
  transition: all var(--transicao);
  font-family: var(--fonte-corpo);
}
.btn-acao:hover { border-color: var(--verde-escuro); color: var(--verde-escuro); background: rgba(11,61,46,0.04); }
.btn-acao.primario { background: var(--verde-escuro); color: var(--verde-limao); border-color: var(--verde-escuro); }
.btn-acao.primario:hover { background: var(--verde-escuro-claro); }
.btn-acao.perigo { border-color: rgba(255,77,79,0.3); color: var(--perigo); }
.btn-acao.perigo:hover { background: rgba(255,77,79,0.06); }

/* Modal */
.modal-content { border-radius: 16px; border: none; }
.modal-header  { border-bottom: 1px solid var(--cinza-200); }
.modal-footer  { border-top: 1px solid var(--cinza-200); }
.form-label-gr { font-size: 0.8rem; font-weight: 600; color: var(--cinza-600); margin-bottom: 4px; display: block; }

/* Empty state */
.empty-tabela td {
  padding: 48px 20px !important;
  text-align: center;
  color: var(--cinza-400);
  font-size: 0.85rem;
}

/* Paginação */
.paginacao {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  padding: 14px 0 0;
}
.paginacao-info { font-size: 0.78rem; color: var(--cinza-600); }
.paginacao-btns { display: flex; gap: 6px; }
.paginacao-btns button {
  padding: 5px 12px;
  font-size: 0.78rem;
  border-radius: 8px;
  border: 1.5px solid var(--cinza-200);
  background: #fff;
  color: var(--preto);
  cursor: pointer;
  font-family: var(--fonte-corpo);
  transition: all var(--transicao);
}
.paginacao-btns button:disabled { opacity: 0.4; cursor: not-allowed; }
.paginacao-btns button.ativo { background: var(--verde-escuro); color: var(--verde-limao); border-color: var(--verde-escuro); }
.paginacao-btns button:not(:disabled):hover { border-color: var(--verde-escuro); color: var(--verde-escuro); }
</style>
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">

    <!-- Stats rápidos -->
    <div class="stats-onibus" data-aos="fade-up" id="statsOnibus">
      <div class="stat-onibus">
        <div class="stat-onibus__icone bg-verde"><i class="fa-solid fa-bus-simple"></i></div>
        <div><div class="stat-onibus__num" id="statTotal">—</div><div class="stat-onibus__label">Total de ônibus</div></div>
      </div>
      <div class="stat-onibus">
        <div class="stat-onibus__icone bg-info"><i class="fa-solid fa-route"></i></div>
        <div><div class="stat-onibus__num" id="statComLinha">—</div><div class="stat-onibus__label">Com linha</div></div>
      </div>
      <div class="stat-onibus">
        <div class="stat-onibus__icone bg-alerta"><i class="fa-solid fa-spray-can"></i></div>
        <div><div class="stat-onibus__num" id="statLimpeza">—</div><div class="stat-onibus__label">Precisam limpeza</div></div>
      </div>
      <div class="stat-onibus">
        <div class="stat-onibus__icone bg-limao"><i class="fa-solid fa-user-tie"></i></div>
        <div><div class="stat-onibus__num" id="statComMotorista">—</div><div class="stat-onibus__label">Com motorista</div></div>
      </div>
    </div>

    <!-- Filtros e busca -->
    <div class="card-gr" data-aos="fade-up" data-aos-delay="50">
      <div class="card-gr__header">
        <h3><i class="fa-solid fa-bus me-2" style="color:var(--verde-limao)"></i>Controle da Frota de Ônibus</h3>
        <button class="btn-gr-primario" id="btnNovoOnibus" style="font-size:0.8rem;padding:8px 16px;">
          <i class="fa-solid fa-plus"></i> Novo Ônibus
        </button>
      </div>

      <div class="card-gr__body" style="padding-bottom: 8px;">

        <!-- Abas de modshop -->
        <div class="abas-modshop" id="abasModshop">
          <button class="aba-modshop ativa" data-modshop="">Todos</button>
        </div>

        <!-- Barra de filtros -->
        <div class="barra-filtros">
          <div class="busca-onibus">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="form-control" id="buscaOnibus" placeholder="Buscar por carro, prefixo...">
          </div>
          <select class="form-select" id="filtroLimpeza" style="width:170px;font-size:0.85rem;height:38px;">
            <option value="">Todos</option>
            <option value="sim">Precisa limpeza</option>
            <option value="nao">Limpo</option>
          </select>
          <select class="form-select" id="filtroLinha" style="width:160px;font-size:0.85rem;height:38px;">
            <option value="">Todas as linhas</option>
            <option value="com_linha">Com linha</option>
            <option value="sem_linha">Sem linha</option>
          </select>
        </div>

        <!-- Tabela -->
        <div class="table-responsive">
          <table class="tabela-gr" id="tabelaOnibus">
            <thead>
              <tr>
                <th>Prefixo</th>
                <th>Modelo</th>
                <th>Modshop</th>
                <th>Linha</th>
                <th>Motorista</th>
                <th>Início</th>
                <th>Limpeza?</th>
                <th>Obs.</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="corpoTabelaOnibus">
              <tr><td colspan="9" class="text-center text-muted py-4">Carregando...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="paginacao" id="paginacao"></div>
      </div>
    </div>

  </main>
</div>

<!-- Modal edição/criação -->
<div class="modal fade" id="modalOnibus" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fonte-display fw-bold" id="tituloModalOnibus">Novo Ônibus</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="onibusIdx">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label-gr">Modelo do carro *</label>
            <input type="text" class="form-control" id="campoCarro" placeholder="Ex: G8 1200 Mercedes Benz">
          </div>
          <div class="col-md-3">
            <label class="form-label-gr">Prefixo *</label>
            <input type="number" class="form-control" id="campoPrefixo" placeholder="Ex: 8201">
          </div>
          <div class="col-md-3">
            <label class="form-label-gr">Modshop</label>
            <select class="form-select" id="campoModshop">
              <option value="Modshop">Modshop</option>
              <option value="Norman Mods">Norman Mods</option>
              <option value="B4D">B4D</option>
              <option value="BRT">BRT</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label-gr">Linha</label>
            <input type="text" class="form-control" id="campoLinha" placeholder="Ex: Linha 123 – Centro">
          </div>
          <div class="col-md-4">
            <label class="form-label-gr">Motorista responsável</label>
            <input type="text" class="form-control" id="campoMotorista" placeholder="Nome do motorista">
          </div>
          <div class="col-md-4">
            <label class="form-label-gr">Data de início</label>
            <input type="date" class="form-control" id="campoDataInicio">
          </div>
          <div class="col-md-4">
            <label class="form-label-gr">Necessita limpeza?</label>
            <select class="form-select" id="campoLimpeza">
              <option value="nao">Não</option>
              <option value="sim">Sim</option>
            </select>
          </div>
          <div class="col-md-8">
            <label class="form-label-gr">Observações</label>
            <input type="text" class="form-control" id="campoObservacoes" placeholder="Observações adicionais">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-gr-outline" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn-gr-primario" id="btnSalvarOnibus">
          <i class="fa-solid fa-floppy-disk"></i> Salvar
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/onibus.js"></script>
</body>
</html>
