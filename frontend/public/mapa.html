<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mapa das Entregas | FELIPINHO LAUNCHER</title>
<link rel="icon" type="image/png" href="img/logo/favicon.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="css/design-system.css" rel="stylesheet">
<style>
  #mapaEntregas { height: 560px; border-radius: var(--raio); overflow:hidden; }
  .leaflet-popup-content-wrapper { border-radius: 10px; }
</style>
</head>
<body>

<div id="appShell" class="app-shell">
  <main id="conteudoPagina">
    <div class="row g-3 mb-3" data-aos="fade-up">
      <div class="col-12">
        <div class="card-gr" style="background:linear-gradient(120deg, var(--verde-escuro), #050505); color:var(--branco); border:none;">
          <div class="card-gr__body d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div>
              <h3 class="fonte-display fw-bold mb-1" style="color:var(--branco);">Mapa de rotas e entregas</h3>
              <p class="mb-0" style="color:rgba(255,255,255,0.7); font-size:0.85rem;">
                Visualize a origem e destino das viagens recentes registradas no sistema.
              </p>
            </div>
            <div class="d-flex gap-2">
              <span class="badge-status status-em_andamento">Em andamento</span>
              <span class="badge-status status-concluida">Concluída</span>
              <span class="badge-status status-agendada">Agendada</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-gr" data-aos="fade-up">
      <div class="card-gr__body p-2 p-md-3">
        <div id="mapaEntregas"></div>
      </div>
    </div>

    <div class="alert mt-3" style="background:rgba(58,166,255,0.08); border:1px solid rgba(58,166,255,0.3); border-radius:var(--raio-sm); font-size:0.85rem;" data-aos="fade-up">
      <i class="fa-solid fa-circle-info me-2" style="color:var(--info)"></i>
      As coordenadas de cada cidade são adicionadas ao registrar a viagem. Viagens sem coordenadas cadastradas não aparecem no mapa.
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="js/config.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/utils/formatadores.js"></script>
<script src="js/utils/layout.js"></script>
<script src="js/pages/mapa.js"></script>
</body>
</html>
