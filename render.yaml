# =====================================================================
# GR EXPRESSO - Configuração de deploy no Render
# =====================================================================
# Este arquivo permite que o Render configure o backend automaticamente
# ao conectar o repositório, sem precisar preencher campos manualmente.
# Saiba mais: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: gr-expresso-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
